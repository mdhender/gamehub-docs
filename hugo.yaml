baseURL: "https://docs.epimethean.dev/"
title: "EC Documentation"
languageCode: "en-us"

module:
  imports:
    - path: github.com/imfing/hextra

enableGitInfo: true

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - ['\[', '\]']
            - ['$$', '$$']
          inline:
            - ['\(', '\)']
        enable: true
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  discord_url: "https://discord.com/invite/YAAfPDPfdp"
  navbar:
    displayTitle: true
    displayLogo: false
  sidebar:
    autoCollapse: true

menu:
  main:
    - identifier: players
      name: Players
      url: /players/
      weight: 100
    - identifier: referees
      name: Referees
      url: /referees/
      weight: 400
    - identifier: developers
      name: Developers
      url: /developers/
      weight: 500
    - identifier: history
      name: History
      url: /history/
      weight: 600
