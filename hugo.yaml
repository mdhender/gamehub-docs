baseURL: "https://docs.damned.dev/"
title: "EC Documentation"
languageCode: "en-us"

module:
  imports:
    - path: github.com/imfing/hextra

enableGitInfo: true

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - ['\[', '\]']
            - ['$$', '$$']
          inline:
            - ['\(', '\)']
        enable: true
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  discord_url: "https://discord.com/invite/YAAfPDPfdp"
  navbar:
    displayTitle: true
    displayLogo: false
  sidebar:
    autoCollapse: true

menu:
  main:
    - identifier: docs
      name: Docs
      url: /docs/
      weight: 10
    - identifier: reference
      name: Reference
      url: /reference/
      weight: 20
    - identifier: history
      name: History
      url: /history/
      weight: 30

